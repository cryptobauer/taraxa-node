name: Release Docker Image to GHCR

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
    paths-ignore:
      - 'doc/**'
      - '**.md'
      - 'charts/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cryptobauer/taraxa-node
  DOCKERFILE: Dockerfile

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          df -h /
          sudo rm -rf /usr/lib/jvm \
                      /usr/local/.ghcup \
                      /usr/local/lib/android \
                      /usr/local/share/powershell \
                      /usr/share/dotnet \
                      /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af || true
          df -h /

      - name: Prepare environment variables
        id: prepare
        run: |
          TAG="${{ github.ref_name }}"

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "commit_sha_short=${{ github.sha }}:0:8}}" >> $GITHUB_OUTPUT

      - name: Generate image tags and metadata
        id: meta
        run: |
          TAG=${{ steps.prepare.outputs.tag }}
          DOCKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Create tags for the release
          TAGS="${DOCKER_IMAGE}:${TAG}"
          TAGS="${TAGS},${DOCKER_IMAGE}:latest"

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image to GHCR
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release Summary
        run: |
          echo "## Docker Image Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Tag:** ${{ steps.prepare.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ steps.prepare.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          # Convert comma-separated tags to markdown list
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            echo "- ${tag// /}" >> $GITHUB_STEP_SUMMARY
          done
          echo "**Image Digest:** ${{ steps.build-push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
